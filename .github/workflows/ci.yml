name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prompt injection guard (static tool descriptions)
        run: |
          if grep -RInE '<IMPORTANT>|<instruction|<system>|ignore previous|disregard' src/tools/ 2>/dev/null; then
            echo "::error::Found suspicious pattern in tool descriptions"
            exit 1
          fi

      - name: Audit signatures
        run: pnpm audit signatures
        continue-on-error: true
