name: Feature request
description: 新機能・改善の提案 / Suggest an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 動機 / Motivation
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案 / Proposal
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 / Alternatives considered
